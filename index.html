<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ホイールカタログ</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="Nakayama_Icon.ico" />
</head>

<body>
  <!-- ===== ヘッダー ===== -->
  <header>
    <h1>ホイールカタログ</h1>

    <nav>
      <a href="staff.html">👥 スタッフ紹介</a>
      <a href="horn.html">🔊 クラクション試聴</a>
    </nav>
  </header>

  <!-- ===== カテゴリ選択 ===== -->
  <main class="category-container">

    <button class="category-btn" data-category="Sports">
      <img src="./images/SPT_V_1.png" alt="Sports">
      <span>Sports</span>
    </button>

    <button class="category-btn" data-category="Muscle">
      <img src="./images/MUS_V_1.png" alt="Muscle">
      <span>Muscle</span>
    </button>

    <button class="category-btn" data-category="SUV">
      <img src="./images/SUV_V_1.png" alt="SUV">
      <span>SUV</span>
    </button>

    <button class="category-btn" data-category="Offroad">
      <img src="./images/OFF_V_1.png" alt="Offroad">
      <span>Offroad</span>
    </button>

    <button class="category-btn" data-category="Lowrider">
      <img src="./images/LOW_V_1.png" alt="Lowrider">
      <span>Lowrider</span>
    </button>

    <button class="category-btn" data-category="Benny's">
      <img src="./images/BNS_V_1.png" alt="Benny's">
      <span>Benny's</span>
    </button>

    <button class="category-btn" data-category="Tuner">
      <img src="./images/TNR_V_1.png" alt="Tuner">
      <span>Tuner</span>
    </button>

    <button class="category-btn" data-category="HighEnd">
      <img src="./images/HED_V_1.png" alt="High End">
      <span>High End</span>
    </button>

    <button class="category-btn" data-category="Bespoke">
      <img src="./images/BSP_V_1.png" alt="Bespoke">
      <span>Bespoke</span>
    </button>

    <button class="category-btn" data-category="Track">
      <img src="./images/RLY_V_1.png" alt="Track">
      <span>Rally</span>
    </button>

    <button class="category-btn" data-category="Street">
      <img src="./images/STR_V_1.png" alt="Street">
      <span>Rally</span>
    </button>
    
    <button class="category-btn" data-category="Open">
      <img src="./images/DRS_V_1.png" alt="Open">
      <span>Dragster</span>
    </button>

    <button class="category-btn" data-category="Bike">
      <img src="./images/BKE_V_1.png" alt="Bike">
      <span>Bike</span>
    </button>
    
  </main>

  <!-- ===== モーダル（ホイール一覧） ===== -->
  <div id="wheel-modal" class="modal hidden">

    <!-- 外側クリック用 -->
    <div class="modal-overlay"></div>

    <!-- 中身 -->
    <div class="modal-content">
      <h2 id="modal-title">Wheels</h2>

      <!-- ホイール表示エリア -->
      <div id="wheel-container"></div>
    </div>

  </div>

  <!-- ===== 一覧 ===== -->
  <section id="wheel-list"></section>

  
  <!-- ===== フッター ===== -->
  <footer class="site-footer">
    <h2>お問い合わせ</h2>
    <p><strong>FlecityName:</strong> 粉末 ぱうだぁ</p>
    <p>
      <strong>Form:</strong>
      <a href="https://forms.gle/HkCUNoGDMVmGTVwe9" target="_blank">
        お問い合わせフォーム
      </a>
    </p>
    <p><strong>Address:</strong> 228 株式会社 中山モータース</p>
  </footer>

  <!-- ===== スクロールトップ ===== -->
  <button id="scroll-to-top">⇪</button>

  <!-- ===== JS ===== -->
  <script src="script.js"></script>

</body>
</html>
